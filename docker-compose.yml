services:
  # Service Aplikasi (PHP)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arabica-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    networks:
      - arabica-network
    depends_on:
      - db
      - redis

  # Service Web Server (Nginx)
  web:
    image: nginx:alpine
    container_name: arabica-nginx
    restart: unless-stopped
    ports:
      - "8080:80" # Kita expose port 8080 agar tidak bentrok dengan aaPanel
    volumes:
      - ./:/var/www
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - arabica-network
    depends_on:
      - app

  # Service Database
  db:
    image: mysql:8.0
    container_name: arabica-db
    restart: unless-stopped
    # Reduce memory usage for low-RAM servers
    command: --innodb-buffer-pool-size=128M --innodb-redo-log-capacity=100663296
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_PASSWORD: secret
      MYSQL_USER: laravel
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - arabica-network

  # Service Redis
  redis:
    image: redis:7-alpine
    container_name: arabica-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"  # Expose untuk akses dari host
    volumes:
      - redisdata:/data
    networks:
      - arabica-network
    command: redis-server --appendonly yes  # Persist data

  # Service Queue Worker
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arabica-queue
    restart: unless-stopped
    working_dir: /var/www
    # Perintah ini yang menjalankan worker secara terus menerus
    command: php artisan queue:work redis --queue=images --verbose --tries=3 --timeout=90
    volumes:
      - ./:/var/www
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - arabica-network
    depends_on:
      - app
      - db
      - redis

networks:
  arabica-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
  redisdata:
    driver: local
